<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MDM Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a73e8 0%, #0d47a1 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 48px 40px;
            width: 100%;
            max-width: 420px;
        }
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }
        .login-icon {
            width: 64px;
            height: 64px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.35);
        }
        .login-icon svg {
            width: 32px;
            height: 32px;
            fill: white;
        }
        .login-header h1 {
            font-size: 24px;
            color: #202124;
            font-weight: 700;
            margin-bottom: 6px;
        }
        .login-header p {
            color: #5f6368;
            font-size: 14px;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .alert-error {
            background: #fce8e6;
            color: #d93025;
            border: 1px solid #f5c6cb;
        }
        .alert-success {
            background: #e6f4ea;
            color: #1e8e3e;
            border: 1px solid #ceead6;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 13px;
            font-weight: 600;
            color: #3c4043;
            margin-bottom: 8px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            color: #202124;
            background: #f8f9fa;
            transition: all 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #1a73e8;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.15);
        }
        .form-group input::placeholder {
            color: #9aa0a6;
        }
        .login-btn {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, #1a73e8, #0d47a1);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.35);
            margin-top: 8px;
        }
        .login-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(26, 115, 232, 0.45);
        }
        .login-btn:active {
            transform: translateY(0);
        }
        .footer-text {
            text-align: center;
            margin-top: 28px;
            font-size: 12px;
            color: #9aa0a6;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <div class="login-icon">
                <svg viewBox="0 0 24 24"><path d="M17 1H7c-1.1 0-2 .9-2 2v18c0 1.1.9 2 2 2h10c1.1 0 2-.9 2-2V3c0-1.1-.9-2-2-2zm0 18H7V5h10v14zm-4.2-5.78v1.75l3.2-2.99L12.8 9v1.7c-3.18.02-5.36 1.01-6.8 3.22 .61-2.2 2.37-3.88 6.6-3.7z"/></svg>
            </div>
            <h1>MDM Dashboard</h1>
            <p>Sign in to manage your devices</p>
        </div>

        <div th:if="${param.error}" class="alert alert-error">
            <span>&#9888;</span> Invalid username or password
        </div>
        <div th:if="${param.logout}" class="alert alert-success">
            <span>&#10003;</span> You have been logged out successfully
        </div>

        <form th:action="@{/login}" method="post">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Enter your username" required autofocus />
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required />
            </div>
            <button type="submit" class="login-btn">Sign In</button>
        </form>

        <div class="footer-text">
            Enterprise Mobile Device Management
        </div>
    </div>
</body>
</html>
